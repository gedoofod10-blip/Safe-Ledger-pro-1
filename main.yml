name: Build Offline Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Dependencies and Build Web App
        run: |
          npm install
          npm run build

      - name: Setup Capacitor (The Magic Wrapper)
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init "Daftar" "com.daftar.app" --web-dir dist
          npx cap add android
          npx cap sync android

      - name: Setup Java for Android
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build the Native APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Final APK
        uses: actions/upload-artifact@v4
        with:
          name: Daftar-App-V1.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
